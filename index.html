<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C4B090" />

    <!-- iOS full-screen app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "default" lets iOS manage the status-bar text color so the clock/
         battery stay legible over BOTH the light (driftwood) day theme and
         the dark (navy) night theme. "black-translucent" forced white text,
         which vanished over the light theme. Pairs with the safe-area-inset
         padding in App.tsx / BottomTabs.tsx. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="And Done" />
    <!-- iOS Add to Home Screen uses this, not the manifest. Points at the
         ampersand icon so the home-screen tile matches the Android PWA. -->
    <link rel="apple-touch-icon" href="/icon-and.svg" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/svg+xml" href="/icon-and.svg" />
    <title>And Done</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
